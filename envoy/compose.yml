services:
  envoy:
    container_name: envoy
    image: envoyproxy/envoy:v1.37-latest
    command:
      - /usr/local/bin/envoy
      - -l
      - info
      - -c
      - /etc/envoy/envoy.yaml
    ports:
      - "3099:3099"
      - "3999:3999"
    volumes:
      - "./envoy.yaml:/etc/envoy/envoy.yaml"
    depends_on:
      barong:
        condition: service_started
      payments:
        condition: service_started