static_resources:
  listeners:
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 3099
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: ingress_http
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/api/v1/auth/identity/sessions"
                          route:
                            cluster: barong
                            prefix_rewrite: "/api/v2/identity/sessions"
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: "/api/v1/auth/resource"
                          route:
                            cluster: barong
                            prefix_rewrite: "/api/v2/resource"
                        - match:
                            prefix: "/api/v1/payments"
                            headers:
                              - name: ":method"
                                string_match:
                                  exact: "POST"
                          route:
                            cluster: payments
                            prefix_rewrite: "/payments"
                        - match:
                            prefix: "/api/v1/payments"
                            headers:
                              - name: ":method"
                                string_match:
                                  exact: "GET"
                          route:
                            cluster: payments-read-model
                            prefix_rewrite: "/payments"
                        - match:
                            prefix: "/api/v1/accounts"
                          route:
                            cluster: accounts
                            prefix_rewrite: "/accounts"
                http_filters:
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      http_service:
                        server_uri:
                          uri: http://barong:8051
                          cluster: barong
                          timeout: 1s
                        path_prefix: "/api/v2/auth"
                        authorization_response:
                          allowed_upstream_headers:
                            patterns:
                              - exact: "authorization"
                      allowed_headers:
                        patterns:
                          - exact: "user-agent"
                          - exact: "cookie"
                          - exact: "x-forwarded-proto"
                          - exact: "authorization"
                          - exact: "proxy-authorization"
                          - exact: "x-forwarded-host"
                          - exact: "x-forwarded-for"
                          - exact: "x-auth-apikey"
                          - exact: "x-auth-nonce"
                          - exact: "x-auth-signature"
                          - exact: "from"
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: barong
      connect_timeout: 0.25s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: barong
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: barong
                      port_value: 8051
    - name: payments
      connect_timeout: 0.25s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: payments
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: payments
                      port_value: 3880
    - name: payments-read-model
      connect_timeout: 0.25s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: payments-read-model
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: payments-read-model
                      port_value: 4880
    - name: accounts
      connect_timeout: 0.25s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: accounts
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: accounts
                      port_value: 3380
admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 3999
